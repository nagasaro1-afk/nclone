    <div class="row-posters">
        <img src="https://picsum.photos/300/160?11" class="poster">
        <img src="https://picsum.photos/300/160?12" class="poster">

    </div>

<input type="text" id="searchBar" placeholder="Search movies..." onkeyup="filterMovies()">

</main>
</body>
<script>
const modal = document.getElementById("imageModal");
const modalImage = document.getElementById("modalImage");


const posters = document.querySelectorAll(".poster");
posters.forEach(poster => {
    poster.addEventListener("click", () => {
        modal.style.display = "flex";
        modalImage.src = poster.src;
    });
});


function closeModal() {
    modal.style.display = "none";
}

function filterMovies() {
    const input = document.getElementById("searchBar").value.toLowerCase();
    const rows = document.querySelectorAll(".row-posters");

    rows.forEach(row => {
        const posters = row.querySelectorAll(".poster");
        posters.forEach(poster => {
            const altText = poster.alt ? poster.alt.toLowerCase() : "";
            const srcText = poster.src.toLowerCase();
            
            if (altText.includes(input) || srcText.includes(input)) {
                poster.style.display = "inline-block";
            } else {
                poster.style.display = "none";
            }
        });
    });
}
</script>

</html>
