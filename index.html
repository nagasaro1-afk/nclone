<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSync</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <div class="logo">
        <img src="cinesync.html.png" alt="cinesync logo">
    </div>
</header>

<section class="auth-section">
  <div class="auth-container">
    <h2>Welcome to CineSync</h2>

    <form id="authForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="auth-btn">Create Account</button>
    </form>
  </div>
</section>

<main>

<div class="image-modal" id="imageModal">
    <span class="close-btn" onclick="closeModal()">✖</span>
    <img id="modalImage">
</div>

<div class="navbar">
    <input type="text" id="searchBar" placeholder="Search movies..." onkeyup="filterMovies()">

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Movies</a>
        <a href="#">TV Shows</a>
        <a href="#">My List</a>
    </div>

    <div class="profile">
        <img src="https://i.pravatar.cc/40">
    </div>
</div>

<section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
        <h1>Stranger Things</h1>
        <p>
            When a young boy disappears, his mother, a police chief,
            and his friends must confront terrifying supernatural forces.
        </p>

        <div class="buttons">
            <button class="play-btn">▶ Play</button>
            <button class="list-btn">+ My List</button>
        </div>
    </div>
</section>

<section class="hero">
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/b9EkMc79ZSU?autoplay=1&mute=1&controls=0&loop=1&playlist=b9EkMc79ZSU"
            frameborder="0"
            allow="autoplay; fullscreen">
        </iframe>
    </div>
</section>

<section class="row">
    <h2>Trending Now</h2>
    <div class="row-posters">
        <img src="dune.png" class="poster" alt="dune">
        <img src="johnwick.png" class="poster" alt="john wick">
        <img src="avatar.jpg" class="poster" alt="avatar">
        <img src="beautyin black.jpg" class="poster" alt="beauty in black">
        <img src="martysupreme.jpg" class="poster" alt="martys supreme">
        <img src="Straw.jpg" class="poster" alt="straw">
        <img src="Sinners (2025).jpg" class="poster" alt="sinners">
        <img src="https://picsum.photos/300/160?5" class="poster" alt="random">
    </div>
</section>

<section class="row">
    <h2>Popular</h2>
    <div class="row-posters">
        <img src="https://picsum.photos/300/160?6" class="poster" alt="popular1">
        <img src="https://picsum.photos/300/160?7" class="poster" alt="popular2">
        <img src="https://picsum.photos/300/160?8" class="poster" alt="popular3">
        <img src="https://picsum.photos/300/160?9" class="poster" alt="popular4">
        <img src="https://picsum.photos/300/160?10" class="poster" alt="popular5">
    </div>
</section>

<section class="row">
    <h2>Action Movies</h2>
    <div class="row-posters">
        <img src="https://picsum.photos/300/160?11" class="poster" alt="action1">
        <img src="https://picsum.photos/300/160?12" class="poster" alt="action2">
        <img src="https://picsum.photos/300/160?13" class="poster" alt="action3">
        <img src="https://picsum.photos/300/160?14" class="poster" alt="action4">
        <img src="https://picsum.photos/300/160?15" class="poster" alt="action5">
    </div>
</section>

</main>


</body>
</html>
